name: User fieldtrack Backend Staging

on:

  push:

    branches:

      - develop

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4

      - name: Deploy to Staging Server

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.SERVER_IP_NEW }}

          username: ${{ secrets.SERVER_USERNAME_NEW }}

          key: ${{ secrets.SERVER_KEY }}

          script: |

            echo "Connecting to the Staging Server..."

            cd /home/ubuntu/node/user-fieldtracking-backend

            echo "Loading NVM..."

            export NVM_DIR="$HOME/.nvm"

            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "Using Node.js version 22..."

            nvm use 22

            echo "Pulling latest changes..."

            git checkout develop

            git pull origin develop

            echo "Installing dependencies..."

            npm install || { echo "npm install failed"; exit 1; }

            echo "Building the project..."

            npm run build || { echo "Build failed"; exit 1; }

            echo "Restarting the application using PM2..."

            export PATH=$HOME/.nvm/versions/node/v22/bin:$PATH

            pm2 restart user-backend:4002 --silent || { echo "PM2 restart failed"; exit 1; }

            echo "Development Deployment Completed Successfully!"
